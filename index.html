<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scholarship Test Result 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="Educare.jpg" alt="School Logo" class="logo">
      <h1>The EduCare School & College Gadoon</h1>
      <h2>Scholarship Test 2026 Result</h2>
      <p>Enter your Registration Number to view your result.</p>
    </div>

    <form id="resultForm">
      <input type="text" id="regNo" placeholder="Enter Registration No." required>
      <button type="submit">Check Result</button>
    </form>

    <p id="message"></p>
    <div id="resultBox"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
